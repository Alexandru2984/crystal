<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Traffic Analyzer</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-box { background-color: var(--card-bg); padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); width: 100%; max-width: 400px; }
    .login-box h2 { margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: var(--text-secondary); }
    .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-primary); border-radius: 4px; font-size: 1rem; }
    .btn { width: 100%; padding: 10px; background-color: var(--accent-color); color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .error-msg { color: var(--error-color); margin-bottom: 15px; text-align: center; display: none; background-color: rgba(207, 102, 121, 0.1); padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>Traffic Analyzer</h2>
      <div class="error-msg" id="error-msg">Invalid username or password.</div>
      <form action="/login" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
